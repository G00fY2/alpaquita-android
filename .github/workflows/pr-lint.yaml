name: "Lint PR"

on:
  pull_request:
    types:
      - opened
      - reopened
      - edited

permissions:
  contents: read

jobs:
  main:
    name: "Validate conventional commit PR title"
    runs-on: ubuntu-slim
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            build
            chore
            ci
            docs
            feat
            fix
            perf
            refactor
            style
            test
