name: 'Renovate Config Validator'
description: 'Validates all Renovate config files found inside default locations using npx.'

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: 'lts/*'

    - name: 'Validate Renovate config'
      shell: bash
      run: |
        "${{ github.action_path }}/scripts/run-renovate-config-validator.sh"
