name: 'JDK Version Extractor'
description: 'Extracts JDK image aliases from a Dockerfile using a bash script'

inputs:
  dockerfile_path:
    description: 'Path to the Dockerfile'
    required: false
    default: 'Dockerfile'

outputs:
  versions_json:
    description: 'JSON array of jdk versions'
    value: ${{ steps.extract-jdk-versions.outputs.json }}
  latest_version:
    description: 'Latest jdk version of the list'
    value: ${{ steps.extract-jdk-versions.outputs.latest }}

runs:
  using: 'composite'
  steps:
    - id: extract-jdk-versions
      shell: bash
      run: |
        raw_list=$("${{ github.action_path }}/scripts/extract-jdk-versions.sh" "${{ inputs.dockerfile_path }}")

        json_result=$(echo "$raw_list" | jq -R . | jq -s -c .)
        echo "List: $json_result"
        echo "json=$json_result" >> "$GITHUB_OUTPUT"

        latest=$(echo "$raw_list" | head -n 1)
        echo "Latest: $latest"
        echo "latest=$latest" >> "$GITHUB_OUTPUT"
